<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبسّط النصوص العربية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 مبسّط النصوص العربية</h1>
        <p>أدخل نصك الطويل وسأختصر لك أبرز النقاط</p>
        
        <textarea id="inputText" placeholder="الصق نصك هنا..." rows="8"></textarea>
        
        <div class="controls">
            <button id="summarizeBtn">لخّص النص</button>
            <button id="copyBtn">نسخ النتيجة</button>
        </div>
        
        <!-- صندوق الإحصائيات -->
        <div id="stats" class="stats-box"></div>
        
        <div class="output-container">
            <h3>النتيجة:</h3>
            <div id="output" class="output-box"></div>
        </div>
        
        <!-- ✅ قسم الدعم بالرابط النهائي -->
        <div class="support-section" style="text-align: center; margin: 40px 0 20px; padding: 30px 20px; background: #f8fafc; border-radius: 20px; border: 2px dashed #cbd5e1;">
            
            <!-- أيقونة -->
            <div style="font-size: 48px; margin-bottom: 10px;">💚</div>
            
            <!-- العنوان -->
            <h3 style="color: #0f172a; font-size: 24px; margin-bottom: 10px;">
                الأداة مجانية للأبد
            </h3>
            
            <!-- الشرح -->
            <p style="color: #334155; font-size: 16px; max-width: 500px; margin: 0 auto 20px; line-height: 1.8;">
                طورت هالأداة عشان تفيد الطلاب والكتّاب والجميع. 
                <br>إذا لقيت فيها فائدة، تقدر تدعم استمراريتها بكوفي ☕
            </p>
            
            <!-- ✅ زر الدعم بالرابط الجديد -->
            <a href="https://selar.com/showlove/text-simplifier" target="_blank" style="text-decoration: none;">
                <button style="background: #f97316; color: white; border: none; padding: 15px 45px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 14px rgba(249, 115, 22, 0.3); transition: transform 0.2s; border: 1px solid #fb923c;"
                        onmouseover="this.style.transform='scale(1.05)'"
                        onmouseout="this.style.transform='scale(1)'">
                    ☕ قدِّم لي قهوة
                </button>
            </a>
            
            <!-- رابط التواصل -->
            <p style="color: #64748b; font-size: 14px; margin-top: 20px;">
                اقتراحاتك تهمني: <strong>@مطور_مبسّط_النصوص</strong>
            </p>
            
            <!-- تأثير خفيف -->
            <div style="font-size: 12px; color: #94a3b8; margin-top: 15px;">
                ⚡ 30 ثانية فقط تدعم استمرارية الأداة
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
