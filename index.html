<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبسّط النصوص العربية</title>
    <link rel="stylesheet" href="style.css">
    <!-- إضافة مكتبة html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="container">
        <h1>📝 مبسّط النصوص العربية</h1>
        <p>أدخل نصك الطويل وسأختصر لك أبرز النقاط</p>
        
        <textarea id="inputText" placeholder="الصق نصك هنا..." rows="8"></textarea>
        
        <div class="controls">
            <button id="summarizeBtn">لخّص النص</button>
            <button id="copyBtn">نسخ النتيجة</button>
            <button id="pdfBtn">📥 تحميل PDF</button>
        </div>
        
        <div id="stats" class="stats-box"></div>
        
        <!-- هذا هو العنصر الذي سنحوله إلى PDF -->
        <div id="pdf-content">
            <div class="output-container">
                <h3>النتيجة:</h3>
                <div id="output" class="output-box"></div>
            </div>
        </div>
        
        <div class="support-section">
            <div class="support-icon">💚</div>
            <h3>الأداة مجانية للأبد</h3>
            <p>
                طورت هالأداة عشان تفيد الطلاب والكتّاب والجميع.
                <br>إذا لقيت فيها فائدة، تقدر تدعم استمراريتها بكوفي ☕
            </p>
            <a href="https://selar.com/showlove/text-simplifier" target="_blank" class="support-btn">
                ☕ قدِّم لي قهوة
            </a>
            <p class="support-contact">
                اقتراحاتك تهمني: <strong>@مطور_مبسّط_النصوص</strong>
            </p>
            <div class="support-note">
                ⚡ 30 ثانية فقط تدعم استمرارية الأداة
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
